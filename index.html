// ============================================================
// DILEMMA SELECTION — pick 10 per playthrough
// ============================================================
const TIER_WEIGHTS = {
  classic: 1, personal: 2, animals: 3, digital: 4,
  identity: 4, meta: 5, absurd: 6,
};

function selectDilemmas() {
  // Group by tier
  const byTier = {};
  for (const d of ALL_DILEMMAS) {
    if (!byTier[d.tier]) byTier[d.tier] = [];
    byTier[d.tier].push(d);
  }

  // Shuffle helper
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function pickN(arr, n) { return shuffle([...arr]).slice(0, n); }

  const chosen = new Set();
  function add(pool, n) {
    const candidates = pool.filter(d => !chosen.has(d.id));
    for (const d of pickN(candidates, n)) chosen.add(d.id);
  }

  // Mandatory slots
  add(byTier.classic || [], 2);                           // 2 classic/number
  const absurdMeta = [...(byTier.absurd||[]), ...(byTier.meta||[]), ...(byTier.identity||[])];
  add(absurdMeta, 2);                                      // 2 absurd/meta/existential
  add(byTier.animals || [], 1);                            // 1 animals/species
  add(byTier.digital || [], 1);                            // 1 digital minds/AI
  const identityPool = (byTier.identity||[]).filter(d => !chosen.has(d.id));
  if (identityPool.length > 0 && ![...chosen].some(id => ALL_DILEMMAS.find(d=>d.id===id)?.tier==='identity')) {
    add(identityPool, 1);                                  // 1 self/identity (if not already picked)
  }

  // Fill remaining to 10
  const remaining = ALL_DILEMMAS.filter(d => !chosen.has(d.id));
  add(remaining, 10 - chosen.size);

  // Collect and sort by tier weight (simpler first, weirder later)
  const selected = ALL_DILEMMAS.filter(d => chosen.has(d.id));
  selected.sort((a, b) => (TIER_WEIGHTS[a.tier]||3) - (TIER_WEIGHTS[b.tier]||3));
  return selected;
}

// Active dilemmas for this playthrough
let DILEMMAS = selectDilemmas();

// ============================================================
// TRACK SEGMENTS
// ============================================================
let segments = [];
let totalTrackLen = 0;

function buildTrackSegments() {
  segments = [];
  let x = 0;
  for (let i = 0; i < DILEMMAS.length; i++) {
    segments.push({ type: 'straight', xStart: x, xEnd: x + STRAIGHT_LEN });
    x += STRAIGHT_LEN;
    segments.push({ type: 'split', xStart: x, xEnd: x + SPLIT_LEN, forkIndex: i });
    x += SPLIT_LEN;
    segments.push({ type: 'paths', xStart: x, xEnd: x + PATHS_LEN, forkIndex: i });
    x += PATHS_LEN;
    segments.push({ type: 'merge', xStart: x, xEnd: x + MERGE_LEN, forkIndex: i });
    x += MERGE_LEN;
  }
  segments.push({ type: 'straight', xStart: x, xEnd: x + STRAIGHT_LEN * 2 });
  totalTrackLen = x + STRAIGHT_LEN * 2;
}

function getSegmentAt(worldZ) {
  for (const seg of segments) {
    if (worldZ >= seg.xStart && worldZ < seg.xEnd) return seg;
  }
  return segments[segments.length - 1];
}

// ============================================================
// STICK FIGURE POSITIONS (pre-computed)
// ============================================================
let allFigures = [];

function buildFigures() {
  allFigures = [];
  for (let i = 0; i < DILEMMAS.length; i++) {
    const pathsSeg = segments.find(s => s.type === 'paths' && s.forkIndex === i);
    if (!pathsSeg) continue;
    const midZ = (pathsSeg.xStart + pathsSeg.xEnd) / 2;
    const d = DILEMMAS[i];

    for (const side of ['left', 'right']) {
      const info = d[side];
      const sign = side === 'left' ? -1 : 1;
      const visCount = Math.min(info.count, 8); // cap visual figures
      for (let j = 0; j < visCount; j++) {
        const spreadRange = Math.min(visCount * 20, PATHS_LEN * 0.7);
        const spread = visCount > 1 ? (j / (visCount - 1) - 0.5) * spreadRange : 0;
        allFigures.push({
          worldZ: midZ + spread,
          worldX: sign * FORK_SPREAD,
          type: info.type,
          side,
          forkIndex: i,
          alive: true,
        });
      }
    }
  }
}

// ============================================================
// CANVAS & STATE
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const SPEED_MIN = 3;      // starting speed (brisk)
const SPEED_MAX = 8;     // final speed (panic mode)

const state = {
  phase: 'menu',
  menuTrolleyX: 0,        // animated trolley on menu screen
  trolleyX: 0,           // world Z position (distance traveled)
  trolleyLateral: 0,     // current lateral (world X) position
  trolleySpeed: SPEED_MIN,
  currentForkIndex: 0,
  chosenTrack: null,      // 'left' | 'right' | null
  forkPhase: 'none',      // 'none' | 'approach' | 'choosing' | 'committed'
  choices: [],
  lightning: null,  // { startTime, bolts: [{points}, ...] } for 'both' effect
  summaryScroll: 0,
  summaryMaxScroll: 0,
};

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', (e) => {
  if (state.phase === 'menu') {
    e.preventDefault();
    state.phase = 'playing';
    state.trolleySpeed = SPEED_MIN;
    return;
  }
  if (state.phase === 'summary') {
    if (e.key === 'r' || e.key === 'R') {
      e.preventDefault();
      restartGame();
    }
    // Scroll summary with arrow keys
    if (e.key === 'ArrowDown') { e.preventDefault(); state.summaryScroll = Math.min(state.summaryScroll + 40, state.summaryMaxScroll); }
    if (e.key === 'ArrowUp') { e.preventDefault(); state.summaryScroll = Math.max(state.summaryScroll - 40, 0); }
    return;
  }
  if (state.phase !== 'playing') return;
  if (state.forkPhase === 'approach' || state.forkPhase === 'choosing') {
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      state.chosenTrack = 'left';
      state.forkPhase = 'committed';
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      state.chosenTrack = 'right';
      state.forkPhase = 'committed';
    }
  }
});

// Mouse wheel for summary scrolling
document.addEventListener('wheel', (e) => {
  if (state.phase === 'summary') {
    state.summaryScroll = Math.max(0, Math.min(state.summaryScroll + e.deltaY * 0.5, state.summaryMaxScroll));
  }
});

// Touch/click support (mobile + mouse)
function getCanvasX(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  return (clientX - rect.left) / rect.width; // 0..1
}

function handleTap(e) {
  e.preventDefault();
  const xRatio = getCanvasX(e);

  if (state.phase === 'menu') {
    state.phase = 'playing';
    state.trolleySpeed = SPEED_MIN;
    return;
  }
  if (state.phase === 'summary') {
    restartGame();
    return;
  }
  if (state.phase !== 'playing') return;
  if (state.forkPhase === 'approach' || state.forkPhase === 'choosing') {
    if (xRatio < 0.5) {
      state.chosenTrack = 'left';
      state.forkPhase = 'committed';
    } else {
      state.chosenTrack = 'right';
      state.forkPhase = 'committed';
    }
  }
}

canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', handleTap, { passive: false });

function restartGame() {
  DILEMMAS = selectDilemmas(); // re-roll dilemmas each playthrough
  state.phase = 'menu';
  state.trolleyX = 0;
  state.trolleyLateral = 0;
  state.trolleySpeed = SPEED_MIN;
  state.menuTrolleyX = 0;
  state.currentForkIndex = 0;
  state.chosenTrack = null;
  state.forkPhase = 'none';
  state.choices = [];
  state.lightning = null;
  state.summaryScroll = 0;
  state.summaryMaxScroll = 0;
  buildTrackSegments();
  buildFigures();
}

// ============================================================
// PROJECTION
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

function project(wx, wz) {
  if (wz < 0.5) wz = 0.5;
  const scale = FOCAL / wz;
  return {
    x: W / 2 + wx * scale,
    y: HORIZON_Y + CAM_H * scale,
    s: scale,
  };
}

// ============================================================
// TRACK LAYOUT — returns [leftOffset, rightOffset] at a world Z
// ============================================================
function getTrackOffsetsAt(worldZ) {
  const seg = getSegmentAt(worldZ);
  if (!seg) return [0, 0];
  const t = clamp01((worldZ - seg.xStart) / (seg.xEnd - seg.xStart));
  switch (seg.type) {
    case 'straight': return [0, 0];
    case 'split':  { const s = t * t * FORK_SPREAD; return [-s, s]; }
    case 'paths':  return [-FORK_SPREAD, FORK_SPREAD];
    case 'merge':  { const s = (1 - t * (2 - t)) * FORK_SPREAD; return [-s, s]; }
  }
  return [0, 0];
}

// Trolley lateral position from track geometry
function getTrolleyLateralAt(worldZ, chosen) {
  const seg = getSegmentAt(worldZ);
  if (!seg) return 0;
  const t = clamp01((worldZ - seg.xStart) / (seg.xEnd - seg.xStart));
  const dest = chosen === 'left' ? -FORK_SPREAD : chosen === 'right' ? FORK_SPREAD : 0; // 'both' or null = center
  switch (seg.type) {
    case 'straight': return 0;
    case 'split':  return chosen ? lerp(0, dest, t * t) : 0;
    case 'paths':  return dest;
    case 'merge':  return lerp(dest, 0, t * (2 - t));
  }
  return 0;
}

// ============================================================
// BACKGROUND
// ============================================================
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#c8e6c9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, HORIZON_Y);

  // Distant hills silhouette
  ctx.fillStyle = '#3b6e24';
  ctx.beginPath();
  ctx.moveTo(0, HORIZON_Y);
  for (let x = 0; x <= W; x += 20) {
    const h = Math.sin(x * 0.005 + state.trolleyX * 0.0003) * 15
            + Math.sin(x * 0.012 + 1.5) * 10
            + Math.sin(x * 0.003 + state.trolleyX * 0.0001) * 20;
    ctx.lineTo(x, HORIZON_Y - Math.max(0, h));
  }
  ctx.lineTo(W, HORIZON_Y);
  ctx.closePath();
  ctx.fill();

  // Ground below horizon (will be overdrawn by road strips)
  ctx.fillStyle = '#4a7c2e';
  ctx.fillRect(0, HORIZON_Y, W, H - HORIZON_Y);
}

// ============================================================
// ROAD RENDERER (pseudo-3D strips, far to near)
// ============================================================
function fillQuad(x1, y1, x2, y2, x3, y3, x4, y4) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  ctx.fill();
}

function drawRoad() {
  let z = DRAW_DIST;
  while (z > MIN_Z) {
    const step = Math.max(1.5, z * 0.035);
    const zNear = Math.max(MIN_Z, z - step);
    const worldZFar = state.trolleyX + z;
    const worldZNear = state.trolleyX + zNear;

    // --- Ground strip with speed stripes ---
    const yFar = project(0, z).y;
    const yNear = project(0, zNear).y;
    const grassStripe = Math.floor(worldZFar / 40) % 2;
    ctx.fillStyle = grassStripe ? '#4a7c2e' : '#3f6d26';
    ctx.fillRect(0, Math.floor(yFar), W, Math.ceil(yNear - yFar) + 1);

    // --- Track gravel + rails ---
    const offFar = getTrackOffsetsAt(worldZFar);
    const offNear = getTrackOffsetsAt(worldZNear);
    const isSplit = Math.abs(offFar[0] - offFar[1]) > 3;

    // How many tracks to draw (1 if merged, 2 if split)
    const trackCount = isSplit ? 2 : 1;
    const tieStripe = Math.floor(worldZFar / 18) % 3 === 0;

    for (let t = 0; t < trackCount; t++) {
      const oxFar = isSplit ? offFar[t] : (offFar[0] + offFar[1]) / 2;
      const oxNear = isSplit ? offNear[t] : (offNear[0] + offNear[1]) / 2;
      const gHW = GRAVEL_HW;

      // Gravel bed
      const gFL = project(oxFar - gHW, z);
      const gFR = project(oxFar + gHW, z);
      const gNL = project(oxNear - gHW, zNear);
      const gNR = project(oxNear + gHW, zNear);
      ctx.fillStyle = '#5a5040';
      fillQuad(gFL.x, gFL.y, gFR.x, gFR.y, gNR.x, gNR.y, gNL.x, gNL.y);

      // Ties
      if (tieStripe) {
        ctx.fillStyle = '#8B6914';
        const tH = Math.max(1, 2.5 * gFL.s);
        const tFL = project(oxFar - gHW * 0.85, z);
        const tFR = project(oxFar + gHW * 0.85, z);
        ctx.fillRect(tFL.x, tFL.y - tH / 2, tFR.x - tFL.x, tH);
      }

      // Rails
      const railW = Math.max(1, 2 * gFL.s);
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = railW;
      const rFL = project(oxFar - GAUGE_HW, z);
      const rFR = project(oxFar + GAUGE_HW, z);
      const rNL = project(oxNear - GAUGE_HW, zNear);
      const rNR = project(oxNear + GAUGE_HW, zNear);
      ctx.beginPath(); ctx.moveTo(rFL.x, rFL.y); ctx.lineTo(rNL.x, rNL.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rFR.x, rFR.y); ctx.lineTo(rNR.x, rNR.y); ctx.stroke();
    }

    z = zNear;
  }
}

// ============================================================
// STICK FIGURES
// ============================================================
function drawStickFigure(x, y, h, type, alive) {
  if (h < 3) return;
  const headR = h * 0.15;
  const lw = Math.max(1, h * 0.06);
  ctx.lineCap = 'round';

  // Dead figures: draw fallen sideways, grey/red
  if (!alive) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.PI / 2 * 0.85); // fallen sideways
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#999';
    ctx.fillStyle = '#999';
    ctx.lineWidth = lw;

    const animalTypes = ['dog','bird','fish','bug','mouse','primate'];
    const isAnimal = animalTypes.includes(type);
    const s = type === 'child' ? 0.65 : type === 'bug' || type === 'mouse' ? 0.4 : type === 'fish' ? 0.5 : isAnimal ? 0.8 : 1;
    const fh = h * s;

    if (isAnimal) {
      const bodyLen = fh * 0.5;
      ctx.beginPath(); ctx.moveTo(-bodyLen / 2, 0); ctx.lineTo(bodyLen / 2, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(bodyLen / 2 + headR * 0.5, 0, headR * s, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0, -fh + headR, headR * s, 0, Math.PI * 2); ctx.fill();
      const ex = headR * s * 0.4;
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = Math.max(1, lw * 0.8);
      ctx.beginPath();
      ctx.moveTo(-ex * 1.5, -fh + headR - ex); ctx.lineTo(-ex * 0.3, -fh + headR + ex);
      ctx.moveTo(-ex * 0.3, -fh + headR - ex); ctx.lineTo(-ex * 1.5, -fh + headR + ex);
      ctx.moveTo(ex * 0.3, -fh + headR - ex); ctx.lineTo(ex * 1.5, -fh + headR + ex);
      ctx.moveTo(ex * 1.5, -fh + headR - ex); ctx.lineTo(ex * 0.3, -fh + headR + ex);
      ctx.stroke();
      ctx.strokeStyle = '#999';
      ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(0, -fh + headR * 2); ctx.lineTo(0, -fh * 0.35); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-fh * 0.15, -fh * 0.5); ctx.lineTo(0, -fh * 0.6); ctx.lineTo(fh * 0.1, -fh * 0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-fh * 0.1, 0); ctx.lineTo(0, -fh * 0.35); ctx.lineTo(fh * 0.05, 0); ctx.stroke();
    }

    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }

  // --- Alive figures ---
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = '#fff';
  ctx.lineWidth = lw;

  // === DOG: horizontal body, 4 legs, tail, pointy ears ===
  if (type === 'dog') {
    const bodyLen = h * 0.5;
    const legH = h * 0.35;
    const bodyY = y - legH;
    // Body
    ctx.beginPath(); ctx.moveTo(x - bodyLen / 2, bodyY); ctx.lineTo(x + bodyLen / 2, bodyY); ctx.stroke();
    // Head
    ctx.beginPath(); ctx.arc(x + bodyLen / 2 + headR, bodyY - headR * 0.3, headR, 0, Math.PI * 2); ctx.fill();
    // Pointy ears
    const earX = x + bodyLen / 2 + headR;
    const earY = bodyY - headR * 0.3 - headR;
    ctx.beginPath(); ctx.moveTo(earX - headR * 0.4, earY + headR * 0.3); ctx.lineTo(earX - headR * 0.15, earY - headR * 0.3); ctx.lineTo(earX + headR * 0.1, earY + headR * 0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(earX + headR * 0.1, earY + headR * 0.3); ctx.lineTo(earX + headR * 0.35, earY - headR * 0.3); ctx.lineTo(earX + headR * 0.6, earY + headR * 0.3); ctx.stroke();
    // 4 legs
    for (const lx of [x - bodyLen * 0.35, x - bodyLen * 0.15, x + bodyLen * 0.15, x + bodyLen * 0.35]) {
      ctx.beginPath(); ctx.moveTo(lx, bodyY); ctx.lineTo(lx, y); ctx.stroke();
    }
    // Tail (wagging)
    const wag = Math.sin(performance.now() * 0.008) * 0.3;
    ctx.beginPath();
    ctx.moveTo(x - bodyLen / 2, bodyY);
    ctx.lineTo(x - bodyLen / 2 - h * 0.15, bodyY - h * 0.25 + Math.sin(wag) * h * 0.05);
    ctx.stroke();
    return;
  }

  // === PRIMATE: like dog but upright-ish, long arms ===
  if (type === 'primate') {
    const bodyH = h * 0.45;
    const bodyTop = y - bodyH;
    const headY2 = bodyTop - headR * 0.8;
    // Head
    ctx.beginPath(); ctx.arc(x, headY2, headR * 1.1, 0, Math.PI * 2); ctx.fill();
    // Body
    ctx.beginPath(); ctx.moveTo(x, bodyTop); ctx.lineTo(x, y - h * 0.15); ctx.stroke();
    // Long arms (hanging)
    ctx.beginPath(); ctx.moveTo(x - h * 0.2, y - h * 0.05); ctx.lineTo(x, bodyTop + bodyH * 0.15); ctx.lineTo(x + h * 0.2, y - h * 0.05); ctx.stroke();
    // Short legs
    ctx.beginPath(); ctx.moveTo(x - h * 0.1, y); ctx.lineTo(x, y - h * 0.15); ctx.lineTo(x + h * 0.1, y); ctx.stroke();
    return;
  }

  // === BIRD: round body, beak, stick legs, wing ===
  if (type === 'bird') {
    const bh = h * 0.6;
    const bodyR = bh * 0.25;
    const bodyY = y - bh * 0.45;
    // Body (oval)
    ctx.beginPath(); ctx.ellipse(x, bodyY, bodyR, bodyR * 0.7, 0, 0, Math.PI * 2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(x + bodyR * 0.8, bodyY - bodyR * 0.6, headR * 0.7, 0, Math.PI * 2); ctx.fill();
    // Beak
    ctx.beginPath();
    ctx.moveTo(x + bodyR * 0.8 + headR * 0.7, bodyY - bodyR * 0.6);
    ctx.lineTo(x + bodyR * 0.8 + headR * 1.4, bodyY - bodyR * 0.4);
    ctx.lineTo(x + bodyR * 0.8 + headR * 0.7, bodyY - bodyR * 0.3);
    ctx.stroke();
    // Wing
    ctx.beginPath();
    ctx.moveTo(x - bodyR * 0.3, bodyY - bodyR * 0.3);
    ctx.quadraticCurveTo(x - bodyR * 1.2, bodyY + bodyR * 0.2, x - bodyR * 0.2, bodyY + bodyR * 0.5);
    ctx.stroke();
    // Legs (stick)
    ctx.beginPath(); ctx.moveTo(x - bodyR * 0.3, bodyY + bodyR * 0.7); ctx.lineTo(x - bodyR * 0.3, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + bodyR * 0.3, bodyY + bodyR * 0.7); ctx.lineTo(x + bodyR * 0.3, y); ctx.stroke();
    // Feet
    ctx.beginPath(); ctx.moveTo(x - bodyR * 0.5, y); ctx.lineTo(x - bodyR * 0.3, y); ctx.lineTo(x - bodyR * 0.1, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + bodyR * 0.1, y); ctx.lineTo(x + bodyR * 0.3, y); ctx.lineTo(x + bodyR * 0.5, y); ctx.stroke();
    return;
  }

  // === FISH: oval body, tail fin, eye ===
  if (type === 'fish') {
    const fh2 = h * 0.5;
    const bodyLen = fh2 * 0.6;
    const bodyH2 = fh2 * 0.3;
    const bodyY = y - fh2 * 0.4;
    // Body (oval)
    ctx.beginPath(); ctx.ellipse(x, bodyY, bodyLen, bodyH2, 0, 0, Math.PI * 2); ctx.fill();
    // Tail fin
    ctx.beginPath();
    ctx.moveTo(x - bodyLen, bodyY);
    ctx.lineTo(x - bodyLen - bodyH2 * 0.8, bodyY - bodyH2 * 0.8);
    ctx.lineTo(x - bodyLen - bodyH2 * 0.8, bodyY + bodyH2 * 0.8);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + bodyLen * 0.5, bodyY - bodyH2 * 0.2, Math.max(1, lw * 0.8), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    return;
  }

  // === MOUSE: tiny, round body, big round ears, long tail ===
  if (type === 'mouse') {
    const mh = h * 0.4;
    const bodyR = mh * 0.2;
    const bodyY = y - bodyR;
    // Body
    ctx.beginPath(); ctx.ellipse(x, bodyY, bodyR * 1.2, bodyR, 0, 0, Math.PI * 2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(x + bodyR * 1.2, bodyY - bodyR * 0.3, bodyR * 0.6, 0, Math.PI * 2); ctx.fill();
    // Round ears
    ctx.beginPath(); ctx.arc(x + bodyR * 1.0, bodyY - bodyR * 1.1, bodyR * 0.4, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + bodyR * 1.6, bodyY - bodyR * 1.1, bodyR * 0.4, 0, Math.PI * 2); ctx.stroke();
    // Tail (curved)
    ctx.beginPath();
    ctx.moveTo(x - bodyR * 1.2, bodyY);
    ctx.quadraticCurveTo(x - bodyR * 2.5, bodyY - bodyR * 1.5, x - bodyR * 2, bodyY - bodyR * 2);
    ctx.stroke();
    // Legs
    ctx.beginPath(); ctx.moveTo(x - bodyR * 0.6, bodyY + bodyR); ctx.lineTo(x - bodyR * 0.6, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + bodyR * 0.6, bodyY + bodyR); ctx.lineTo(x + bodyR * 0.6, y); ctx.stroke();
    return;
  }

  // === BUG: tiny dot with antennae and 6 legs ===
  if (type === 'bug') {
    const bh = h * 0.35;
    const bodyR = bh * 0.18;
    const bodyY = y - bodyR;
    // Body segments (3 circles)
    for (let i = 0; i < 3; i++) {
      const bx = x - bodyR * 1.5 + i * bodyR * 1.5;
      ctx.beginPath(); ctx.arc(bx, bodyY, bodyR * (i === 2 ? 0.7 : 0.55), 0, Math.PI * 2); ctx.fill();
    }
    // Antennae
    const headX = x + bodyR * 1.5;
    ctx.beginPath(); ctx.moveTo(headX, bodyY - bodyR * 0.5); ctx.lineTo(headX + bodyR, bodyY - bodyR * 1.8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(headX, bodyY - bodyR * 0.5); ctx.lineTo(headX - bodyR * 0.5, bodyY - bodyR * 1.8); ctx.stroke();
    // 6 legs (3 per side)
    for (let i = 0; i < 3; i++) {
      const lx2 = x - bodyR * 1.5 + i * bodyR * 1.5;
      ctx.beginPath(); ctx.moveTo(lx2, bodyY + bodyR * 0.5); ctx.lineTo(lx2 - bodyR * 0.8, y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(lx2, bodyY + bodyR * 0.5); ctx.lineTo(lx2 + bodyR * 0.8, y); ctx.stroke();
    }
    return;
  }

  // === HUMAN TYPES ===
  const scale = type === 'child' ? 0.65 : 1;
  const fh = h * scale;
  const fy = y;
  const headY = fy - fh + headR * scale;
  const neckY = headY + headR * scale;
  const hipY = fy - fh * 0.35;
  const shoulderY = neckY + fh * 0.08;

  // Head
  ctx.beginPath(); ctx.arc(x, headY, headR * scale, 0, Math.PI * 2); ctx.fill();

  // === PHILOSOPHER: graduation cap ===
  if (type === 'philosopher') {
    const capW = headR * scale * 2.8;
    const capH = headR * scale * 0.5;
    const capTop = headY - headR * scale - capH * 0.3;
    // Flat top board
    ctx.fillStyle = '#333';
    ctx.fillRect(x - capW / 2, capTop, capW, capH * 0.4);
    // Skull cap (small triangle beneath)
    ctx.beginPath();
    ctx.moveTo(x - headR * scale * 0.7, headY - headR * scale * 0.5);
    ctx.lineTo(x + headR * scale * 0.7, headY - headR * scale * 0.5);
    ctx.lineTo(x + headR * scale * 0.5, capTop + capH * 0.4);
    ctx.lineTo(x - headR * scale * 0.5, capTop + capH * 0.4);
    ctx.closePath();
    ctx.fill();
    // Tassel
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = Math.max(1, lw * 0.8);
    ctx.beginPath();
    ctx.moveTo(x + capW / 2 - lw, capTop + capH * 0.2);
    ctx.lineTo(x + capW / 2 + headR * 0.3, capTop + capH + headR * scale * 0.6);
    ctx.stroke();
    // Small tassel ball
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x + capW / 2 + headR * 0.3, capTop + capH + headR * scale * 0.6, lw * 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Reset colors
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#fff';
    ctx.lineWidth = lw;
  }

  // === ELDERLY: slightly hunched ===
  if (type === 'elderly') {
    // Body (hunched — slight curve forward)
    ctx.beginPath(); ctx.moveTo(x, neckY); ctx.quadraticCurveTo(x + fh * 0.05, (neckY + hipY) / 2, x, hipY); ctx.stroke();
  } else {
    // Body (straight)
    ctx.beginPath(); ctx.moveTo(x, neckY); ctx.lineTo(x, hipY); ctx.stroke();
  }

  // Arms
  const armLen = fh * 0.22;
  ctx.beginPath();
  ctx.moveTo(x - armLen, shoulderY + armLen * 0.5);
  ctx.lineTo(x, shoulderY);
  ctx.lineTo(x + armLen, shoulderY + armLen * 0.5);
  ctx.stroke();

  // Legs
  const legSpread = fh * 0.15;
  ctx.beginPath();
  ctx.moveTo(x - legSpread, fy);
  ctx.lineTo(x, hipY);
  ctx.lineTo(x + legSpread, fy);
  ctx.stroke();

  // === ELDERLY: cane ===
  if (type === 'elderly') {
    // Cane from right hand to ground
    ctx.beginPath();
    ctx.moveTo(x + armLen + lw, shoulderY + armLen * 0.5);
    ctx.lineTo(x + armLen + lw, fy);
    ctx.stroke();
    // Cane handle (small hook)
    ctx.beginPath();
    ctx.arc(x + armLen + lw - lw * 1.5, shoulderY + armLen * 0.5, lw * 1.5, -Math.PI * 0.5, Math.PI * 0.5, true);
    ctx.stroke();
  }

  // === CHILD: small bow/ribbon on head ===
  if (type === 'child') {
    const bx = x + headR * scale * 0.6;
    const by = headY - headR * scale * 0.5;
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx - headR * 0.4, by - headR * 0.3);
    ctx.lineTo(bx, by - headR * 0.1);
    ctx.lineTo(bx + headR * 0.4, by - headR * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff';
  }
}

function drawFigures() {
  // Collect visible figures with projected positions
  const visible = [];
  for (const fig of allFigures) {
    const relZ = fig.worldZ - state.trolleyX;
    if (relZ < 5 || relZ > DRAW_DIST) continue;
    const p = project(fig.worldX, relZ);
    const figH = 40 * p.s;
    if (figH < 2) continue;
    visible.push({ ...fig, relZ, sx: p.x, sy: p.y, figH });
  }
  // Sort far-to-near (painter's algorithm)
  visible.sort((a, b) => b.relZ - a.relZ);
  for (const fig of visible) {
    drawStickFigure(fig.sx, fig.sy, fig.figH, fig.type, fig.alive);
  }
}

// ============================================================
// TROLLEY (rear view, fixed screen position)
// ============================================================
function drawTrolleyRear(sx, sy) {
  const w = 64, wTop = 50, h = 45;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(sx - wTop / 2 + 4, sy - h + 4);
  ctx.lineTo(sx + wTop / 2 + 4, sy - h + 4);
  ctx.lineTo(sx + w / 2 + 4, sy + 4);
  ctx.lineTo(sx - w / 2 + 4, sy + 4);
  ctx.closePath();
  ctx.fill();

  // Body (trapezoid, wider at bottom)
  ctx.fillStyle = COL_TROLLEY;
  ctx.beginPath();
  ctx.moveTo(sx - wTop / 2, sy - h);
  ctx.lineTo(sx + wTop / 2, sy - h);
  ctx.lineTo(sx + w / 2, sy);
  ctx.lineTo(sx - w / 2, sy);
  ctx.closePath();
  ctx.fill();

  // Lower body darker
  ctx.fillStyle = COL_TROLLEY_DK;
  ctx.beginPath();
  const midW = (wTop + w) / 4;
  ctx.moveTo(sx - midW, sy - h * 0.45);
  ctx.lineTo(sx + midW, sy - h * 0.45);
  ctx.lineTo(sx + w / 2, sy);
  ctx.lineTo(sx - w / 2, sy);
  ctx.closePath();
  ctx.fill();

  // Roof
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(sx - wTop / 2 + 4, sy - h - 3, wTop - 8, 4);

  // Back window
  ctx.fillStyle = '#aed6f1';
  const bwW = 26, bwH = 14;
  ctx.fillRect(sx - bwW / 2, sy - h + 7, bwW, bwH);

  // Window frame
  ctx.strokeStyle = '#7f1d1d';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx - bwW / 2, sy - h + 7, bwW, bwH);

  // Tail lights
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(sx - w / 2 + 4, sy - 12, 8, 5);
  ctx.fillRect(sx + w / 2 - 12, sy - 12, 8, 5);

  // Bumper
  ctx.fillStyle = '#666';
  ctx.fillRect(sx - w / 2 + 2, sy - 2, w - 4, 4);

  // Wheels (visible at sides)
  ctx.fillStyle = '#222';
  ctx.fillRect(sx - w / 2 - 3, sy - 8, 6, 10);
  ctx.fillRect(sx + w / 2 - 3, sy - 8, 6, 10);
}

// ============================================================
// UI OVERLAY
// ============================================================
function drawUI() {
  const fi = state.currentForkIndex;
  if (fi < DILEMMAS.length && state.forkPhase !== 'none') {
    const dilemma = DILEMMAS[fi];

    // Label background
    ctx.font = 'bold 26px Arial, sans-serif';
    const measured = ctx.measureText(dilemma.label).width;
    const pad = 20;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    const boxW = Math.max(measured + pad * 2, 400);
    ctx.fillRect(W / 2 - boxW / 2, 15, boxW, 85);

    // Label text
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText(dilemma.label, W / 2, 42);
    ctx.fillStyle = '#FFD700';
    ctx.fillText(dilemma.label, W / 2, 42);

    // Option sub-labels
    ctx.font = 'bold 18px Arial, sans-serif';
    const leftText = '\u2190 ' + dilemma.left.desc;
    const rightText = dilemma.right.desc + ' \u2192';
    const leftX = W / 2 - 120;
    const rightX = W / 2 + 120;
    const optY = 75;

    if (state.forkPhase === 'approach' || state.forkPhase === 'choosing') {
      // Both options in white, equally prominent
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(leftText, leftX, optY);
      ctx.fillText(leftText, leftX, optY);
      ctx.strokeText(rightText, rightX, optY);
      ctx.fillText(rightText, rightX, optY);
    } else if (state.forkPhase === 'committed') {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;

      if (state.chosenTrack === 'both') {
        // Both hit — show both in red
        ctx.fillStyle = '#ff4444';
        ctx.strokeText(leftText, leftX, optY);
        ctx.fillText(leftText, leftX, optY);
        ctx.strokeText(rightText, rightX, optY);
        ctx.fillText(rightText, rightX, optY);
        // Strike-through both
        const lw = ctx.measureText(leftText).width;
        const rw = ctx.measureText(rightText).width;
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(leftX - lw / 2, optY); ctx.lineTo(leftX + lw / 2, optY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightX - rw / 2, optY); ctx.lineTo(rightX + rw / 2, optY); ctx.stroke();
      } else {
        const chosenX = state.chosenTrack === 'left' ? leftX : rightX;
        const chosenText = state.chosenTrack === 'left' ? leftText : rightText;
        const otherX = state.chosenTrack === 'left' ? rightX : leftX;
        const otherText = state.chosenTrack === 'left' ? rightText : leftText;

        // Chosen option: bright red with circle highlight
        ctx.fillStyle = '#ff4444';
        ctx.strokeText(chosenText, chosenX, optY);
        ctx.fillText(chosenText, chosenX, optY);
        // Draw circle/rounded rect around chosen
        const cw = ctx.measureText(chosenText).width;
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 3;
        const pad = 8;
        const rx = chosenX - cw / 2 - pad;
        const ry = optY - 14;
        const rw = cw + pad * 2;
        const rh = 24;
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(rx, ry, rw, rh, 12);
        } else {
          ctx.rect(rx, ry, rw, rh);
        }
        ctx.stroke();

        // Other option: dimmed, with checkmark (saved)
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(otherText, otherX, optY);
        ctx.fillText(otherText, otherX, optY);
      }
    }
  }

  // Fork counter
  ctx.font = '16px Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  const counter = 'Dilemma ' + Math.min(fi + 1, DILEMMAS.length) + '/' + DILEMMAS.length;
  ctx.strokeText(counter, 15, H - 15);
  ctx.fillText(counter, 15, H - 15);

  // Reset
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

// ============================================================
// LIGHTNING EFFECT (for 'both' punishment)
// ============================================================
function generateBolt(x1, y1, x2, y2) {
  // Generate jagged lightning bolt points from (x1,y1) to (x2,y2)
  const points = [{ x: x1, y: y1 }];
  const segments = 8 + Math.floor(Math.random() * 5);
  for (let i = 1; i < segments; i++) {
    const t = i / segments;
    const mx = lerp(x1, x2, t) + (Math.random() - 0.5) * 60;
    const my = lerp(y1, y2, t) + (Math.random() - 0.5) * 20;
    points.push({ x: mx, y: my });
  }
  points.push({ x: x2, y: y2 });
  return points;
}

function spawnLightning() {
  // Find where the figures are on screen for both tracks
  const fi = state.currentForkIndex;
  const pathsSeg = segments.find(s => s.type === 'paths' && s.forkIndex === fi);
  if (!pathsSeg) return;
  const midZ = (pathsSeg.xStart + pathsSeg.xEnd) / 2;
  const relZ = midZ - state.trolleyX;

  const leftTarget = project(-FORK_SPREAD, Math.max(30, relZ));
  const rightTarget = project(FORK_SPREAD, Math.max(30, relZ));

  const bolts = [];
  // 2-3 bolts per side
  for (let i = 0; i < 3; i++) {
    bolts.push(generateBolt(
      leftTarget.x + (Math.random() - 0.5) * 40, 0,
      leftTarget.x + (Math.random() - 0.5) * 30, leftTarget.y
    ));
    bolts.push(generateBolt(
      rightTarget.x + (Math.random() - 0.5) * 40, 0,
      rightTarget.x + (Math.random() - 0.5) * 30, rightTarget.y
    ));
  }

  state.lightning = {
    startTime: performance.now(),
    bolts,
    duration: 800, // ms
  };

  // Lightning kills all figures on both tracks immediately
  for (const fig of allFigures) {
    if (fig.forkIndex === fi && fig.alive) {
      fig.alive = false;
    }
  }
}

function drawLightning() {
  if (!state.lightning) return;
  const elapsed = performance.now() - state.lightning.startTime;
  if (elapsed > state.lightning.duration) {
    state.lightning = null;
    return;
  }

  const t = elapsed / state.lightning.duration;
  // Flicker: alternate between bright and dim rapidly
  const flicker = Math.sin(elapsed * 0.05) > -0.3;
  if (!flicker) return;

  const alpha = 1 - t * t; // fade out

  // Screen flash (brief white overlay)
  if (t < 0.15) {
    ctx.fillStyle = `rgba(255, 255, 255, ${0.4 * (1 - t / 0.15)})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 15;

  for (const bolt of state.lightning.bolts) {
    // Main bolt (thick, white-blue)
    ctx.strokeStyle = '#e0e8ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bolt[0].x, bolt[0].y);
    for (let i = 1; i < bolt.length; i++) {
      ctx.lineTo(bolt[i].x, bolt[i].y);
    }
    ctx.stroke();

    // Bright core
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bolt[0].x, bolt[0].y);
    for (let i = 1; i < bolt.length; i++) {
      ctx.lineTo(bolt[i].x, bolt[i].y);
    }
    ctx.stroke();
  }

  ctx.restore();
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  if (state.phase === 'menu') {
    state.menuTrolleyX += 2.5;
    if (state.menuTrolleyX > W + 100) state.menuTrolleyX = -100;
    return;
  }
  if (state.phase !== 'playing') return;

  // Speed escalation: ramp from SPEED_MIN to SPEED_MAX across dilemmas
  const progress = state.currentForkIndex / Math.max(1, DILEMMAS.length - 1);
  const targetSpeed = lerp(SPEED_MIN, SPEED_MAX, progress * progress); // quadratic ramp — late acceleration
  state.trolleySpeed += (targetSpeed - state.trolleySpeed) * 0.01; // smooth transition

  state.trolleyX += state.trolleySpeed;

  // --- Fork phase state machine ---
  const seg = getSegmentAt(state.trolleyX);
  if (!seg) return;

  if (seg.type === 'straight') {
    if (state.forkPhase === 'none' && state.currentForkIndex < DILEMMAS.length) {
      const splitSeg = segments.find(s => s.type === 'split' && s.forkIndex === state.currentForkIndex);
      if (splitSeg) {
        const dist = splitSeg.xStart - state.trolleyX;
        if (dist > 0 && dist < STRAIGHT_LEN) {
          state.forkPhase = 'approach';
        }
      }
    }
    if (state.forkPhase === 'committed') {
      const mergeSeg = segments.find(s => s.type === 'merge' && s.forkIndex === state.currentForkIndex);
      if (mergeSeg && state.trolleyX >= mergeSeg.xEnd) {
        const d = DILEMMAS[state.currentForkIndex];
        if (state.chosenTrack === 'both') {
          state.choices.push({
            dilemmaIndex: state.currentForkIndex,
            chose: 'both',
            killed: { desc: d.left.desc + ' AND ' + d.right.desc, count: d.left.count + d.right.count },
            saved: { desc: 'nobody', count: 0 },
          });
        } else {
          const killed = d[state.chosenTrack];
          const savedSide = state.chosenTrack === 'left' ? 'right' : 'left';
          state.choices.push({
            dilemmaIndex: state.currentForkIndex,
            chose: state.chosenTrack,
            killed,
            saved: d[savedSide],
          });
        }
        state.currentForkIndex++;
        state.chosenTrack = null;
        state.forkPhase = 'none';
      }
    }
  } else if (seg.type === 'split') {
    if (state.forkPhase === 'approach') state.forkPhase = 'choosing';
  } else if (seg.type === 'paths') {
    // Once the tracks have fully split, no more choosing — too late!
    if (!state.chosenTrack && (state.forkPhase === 'choosing' || state.forkPhase === 'approach')) {
      state.chosenTrack = 'both';  // didn't choose — hit everyone
      state.forkPhase = 'committed';
      spawnLightning();
    }
  }

  // Compute trolley lateral position at the visual z (trolley renders at z=35 from camera)
  state.trolleyLateral = getTrolleyLateralAt(state.trolleyX + 35, state.chosenTrack);

  // --- Collision detection: mark figures as dead AHEAD of trolley ---
  if (state.chosenTrack && state.forkPhase === 'committed') {
    for (const fig of allFigures) {
      if (!fig.alive) continue;
      if (fig.forkIndex !== state.currentForkIndex) continue;
      const dist = fig.worldZ - state.trolleyX;
      // Kill figures when trolley is ~120 units away (still very visible)
      if (dist < 120 && dist > -50) {
        if (state.chosenTrack === 'both' || fig.side === state.chosenTrack) {
          fig.alive = false;
        }
      }
    }
  }

  // Transition to summary once all forks are done
  if (state.currentForkIndex >= DILEMMAS.length && state.forkPhase === 'none') {
    state.trolleySpeed = Math.max(0, state.trolleySpeed - 0.15);
    if (state.trolleySpeed <= 0) {
      state.phase = 'summary';
    }
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.clearRect(0, 0, W, H);

  if (state.phase === 'menu') {
    drawMenu();
    return;
  }
  if (state.phase === 'summary') {
    drawSummary();
    return;
  }

  // 1. Sky + hills
  drawBackground();

  // 2. Road (pseudo-3D strips)
  drawRoad();

  // 3. Stick figures
  drawFigures();

  // 3.5. Lightning effect (for 'both' punishment)
  drawLightning();

  // 4. Trolley (rear view, fixed near bottom)
  const trolleySY = H - 75;
  // Match the road projection: trolley is visually at ~z=35 from camera
  const trolleySX = W / 2 + state.trolleyLateral * FOCAL / 35;
  drawTrolleyRear(trolleySX, trolleySY);

  // 5. UI
  drawUI();
}

// ============================================================
// MENU SCREEN
// ============================================================
function drawMenu() {
  // Dark background with subtle vignette
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Animated track lines across middle
  const trackY = H * 0.55;
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  // Rails
  ctx.beginPath(); ctx.moveTo(0, trackY - 6); ctx.lineTo(W, trackY - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, trackY + 6); ctx.lineTo(W, trackY + 6); ctx.stroke();
  // Ties
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 3;
  for (let tx = (state.menuTrolleyX * 0.5) % 20 - 20; tx < W + 20; tx += 20) {
    ctx.beginPath(); ctx.moveTo(tx, trackY - 10); ctx.lineTo(tx, trackY + 10); ctx.stroke();
  }
  // Rails brighter
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, trackY - 6); ctx.lineTo(W, trackY - 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, trackY + 6); ctx.lineTo(W, trackY + 6); ctx.stroke();

  // Animated trolley rolling across
  const mx = state.menuTrolleyX;
  const my = trackY;
  // Shadow
  ctx.fillStyle = 'rgba(200,50,30,0.15)';
  ctx.fillRect(mx - 30, my - 28, 64, 32);
  // Body
  ctx.fillStyle = COL_TROLLEY;
  ctx.fillRect(mx - 28, my - 26, 56, 22);
  ctx.fillStyle = COL_TROLLEY_DK;
  ctx.fillRect(mx - 28, my - 14, 56, 10);
  // Roof
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(mx - 22, my - 29, 44, 4);
  // Window
  ctx.fillStyle = '#aed6f1';
  ctx.fillRect(mx - 10, my - 23, 20, 10);
  // Wheels
  ctx.fillStyle = '#222';
  const wheelR = 5;
  const wheelAngle = state.menuTrolleyX * 0.15;
  for (const wx of [mx - 18, mx + 18]) {
    ctx.beginPath(); ctx.arc(wx, my, wheelR, 0, Math.PI * 2); ctx.fill();
    // Spoke
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(wx + Math.cos(wheelAngle) * wheelR * 0.7, my + Math.sin(wheelAngle) * wheelR * 0.7);
    ctx.lineTo(wx - Math.cos(wheelAngle) * wheelR * 0.7, my - Math.sin(wheelAngle) * wheelR * 0.7);
    ctx.stroke();
  }

  // Stick figures waiting ahead of trolley (some on the track, doomed)
  const figBaseX = mx + 120;
  if (figBaseX < W + 50 && figBaseX > -50) {
    ctx.strokeStyle = '#fff';
    ctx.fillStyle = '#fff';
    ctx.lineWidth = 1.5;
    // 3 little figures standing on the track
    for (let i = 0; i < 3; i++) {
      const fx = figBaseX + i * 15;
      const fy = trackY;
      const fh = 20;
      const hr = 3;
      ctx.beginPath(); ctx.arc(fx, fy - fh + hr, hr, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(fx, fy - fh + hr * 2); ctx.lineTo(fx, fy - fh * 0.35); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx - 5, fy - fh * 0.55); ctx.lineTo(fx, fy - fh * 0.65); ctx.lineTo(fx + 5, fy - fh * 0.55); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx - 4, fy); ctx.lineTo(fx, fy - fh * 0.35); ctx.lineTo(fx + 4, fy); ctx.stroke();
    }
  }

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title shadow
  ctx.font = 'bold 48px Arial, sans-serif';
  ctx.fillStyle = '#300';
  ctx.fillText('TROLLEY PROBLEM', W / 2 + 2, H * 0.18 + 2);
  ctx.fillText('THE GAME', W / 2 + 2, H * 0.28 + 2);

  // Title main
  ctx.fillStyle = '#c0392b';
  ctx.fillText('TROLLEY PROBLEM', W / 2, H * 0.18);
  ctx.font = 'bold 52px Arial, sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('THE GAME', W / 2, H * 0.28);

  // Subtitle
  ctx.font = 'italic 16px Arial, sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText('"No one gets off this ride with clean hands."', W / 2, H * 0.37);

  // Instructions
  ctx.font = '15px Arial, sans-serif';
  ctx.fillStyle = '#888';
  ctx.fillText('\u2190 LEFT / RIGHT \u2192  or tap either side to choose', W / 2, H * 0.72);

  // Start prompt (blinking)
  ctx.font = 'bold 22px Arial, sans-serif';
  const blink = Math.sin(performance.now() * 0.004) > 0;
  ctx.fillStyle = blink ? '#FFD700' : '#665500';
  ctx.fillText('Press any key or tap to begin your moral descent', W / 2, H * 0.85);

  // Dilemma count teaser
  ctx.font = '12px Arial, sans-serif';
  ctx.fillStyle = '#444';
  ctx.fillText(DILEMMAS.length + ' dilemmas. 0 good answers.', W / 2, H * 0.93);
}

// ============================================================
// SUMMARY SCREEN
// ============================================================
function drawSummary() {
  // Dark background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, H);
  ctx.clip();
  ctx.translate(0, -state.summaryScroll);

  let yPos = 40;
  const leftMargin = 60;
  const contentW = W - leftMargin * 2;

  // Title
  ctx.font = 'bold 32px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('YOUR MORAL REPORT CARD', W / 2, yPos);
  yPos += 50;

  // Divider
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(leftMargin, yPos); ctx.lineTo(W - leftMargin, yPos); ctx.stroke();
  yPos += 20;

  // Body count
  let totalKilled = 0;
  let totalSaved = 0;
  for (const c of state.choices) {
    totalKilled += c.killed.count;
    totalSaved += c.saved.count;
  }

  ctx.font = 'bold 20px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('Total Body Count: ' + totalKilled, W / 2 - 120, yPos);
  ctx.fillStyle = '#44ff44';
  ctx.fillText('Saved: ' + totalSaved, W / 2 + 140, yPos);
  yPos += 40;

  // Ethical profile
  const tagCounts = { utilitarian: 0, deontological: 0, contractualist: 0, evil: 0 };
  for (const c of state.choices) {
    const dilemma = DILEMMAS[c.dilemmaIndex];
    if (!dilemma) continue;
    // Classify based on which side was chosen
    let choiceTag;
    if (c.chose === 'both') {
      choiceTag = 'evil'; // indecision kills everyone
    } else {
      choiceTag = dilemma.tags[c.chose];
    }
    if (choiceTag) {
      tagCounts[choiceTag] = (tagCounts[choiceTag] || 0) + 1;
    }
  }
  const totalTagged = Math.max(1, Object.values(tagCounts).reduce((a, b) => a + b, 0));
  const pcts = {};
  for (const tag in tagCounts) {
    pcts[tag] = Math.round((tagCounts[tag] / totalTagged) * 100);
  }
  // Fix rounding to sum to 100
  const pctSum = Object.values(pcts).reduce((a, b) => a + b, 0);
  if (pctSum !== 100) {
    const maxTag = Object.keys(pcts).reduce((a, b) => pcts[a] >= pcts[b] ? a : b);
    pcts[maxTag] += 100 - pctSum;
  }

  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('YOUR ETHICAL PROFILE', W / 2, yPos);
  yPos += 30;

  // Profile bars
  const tagColors = { utilitarian: '#3498db', deontological: '#9b59b6', contractualist: '#2ecc71', evil: '#e74c3c' };
  const tagLabels = { utilitarian: 'Utilitarian', deontological: 'Deontologist', contractualist: 'Contractualist', evil: 'Evil' };
  const barW = 300;
  const barH = 22;
  const barX = W / 2 - barW / 2;

  for (const tag of ['utilitarian', 'deontological', 'contractualist', 'evil']) {
    // Label
    ctx.font = '14px Arial, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = tagColors[tag];
    ctx.fillText(tagLabels[tag], barX - 10, yPos + barH / 2 + 5);
    // Bar background
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, yPos, barW, barH);
    // Bar fill
    ctx.fillStyle = tagColors[tag];
    ctx.fillRect(barX, yPos, barW * (pcts[tag] / 100), barH);
    // Percentage text
    ctx.font = 'bold 13px Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(pcts[tag] + '%', barX + barW + 10, yPos + barH / 2 + 5);
    yPos += barH + 8;
  }
  yPos += 15;

  // Dominant alignment title
  const dominant = Object.keys(pcts).reduce((a, b) => pcts[a] >= pcts[b] ? a : b);
  const titles = {
    utilitarian: 'The Cold Calculator',
    deontological: 'The Rule Follower',
    contractualist: 'The Social Contract Enthusiast',
    evil: 'Genuinely Terrible Person',
  };
  ctx.font = 'bold 22px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = tagColors[dominant];
  ctx.fillText('"' + titles[dominant] + '"', W / 2, yPos);
  yPos += 40;

  // Divider
  ctx.strokeStyle = '#444';
  ctx.beginPath(); ctx.moveTo(leftMargin, yPos); ctx.lineTo(W - leftMargin, yPos); ctx.stroke();
  yPos += 20;

  // Choice-by-choice breakdown
  ctx.font = 'bold 16px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.fillText('CHOICE BY CHOICE', W / 2, yPos);
  yPos += 25;

  for (let i = 0; i < state.choices.length; i++) {
    const c = state.choices[i];
    const dilemma = DILEMMAS[c.dilemmaIndex];

    // Dilemma label
    ctx.font = 'bold 15px Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFD700';
    ctx.fillText((i + 1) + '. ' + dilemma.label, leftMargin, yPos);
    yPos += 20;

    // Choice made
    ctx.font = '14px Arial, sans-serif';
    if (c.chose === 'both') {
      ctx.fillStyle = '#ff4444';
      ctx.fillText('   You chose: NOBODY (lightning killed everyone)', leftMargin + 10, yPos);
    } else {
      ctx.fillStyle = '#ff8844';
      ctx.fillText('   Killed: ' + c.killed.desc + '  |  Saved: ' + c.saved.desc, leftMargin + 10, yPos);
    }
    yPos += 20;

    // Sarcastic commentary
    ctx.font = 'italic 13px Arial, sans-serif';
    ctx.fillStyle = '#888';
    let comment;
    if (c.chose === 'both') {
      comment = '"' + (dilemma.indecision || 'Indecision is also a choice. A terrible one.') + '"';
    } else {
      comment = '"' + (dilemma.commentary[c.chose] || 'No comment.') + '"';
    }
    ctx.fillText('   ' + comment, leftMargin + 10, yPos);
    yPos += 28;
  }

  yPos += 20;

  // Restart prompt
  ctx.font = 'bold 24px Arial, sans-serif';
  ctx.textAlign = 'center';
  const blink = Math.sin(performance.now() * 0.004) > 0;
  ctx.fillStyle = blink ? '#FFD700' : '#aa8800';
  ctx.fillText('Press R or Tap to Ride Again', W / 2, yPos);
  yPos += 60;

  // Track max scroll
  state.summaryMaxScroll = Math.max(0, yPos - H + 20);

  ctx.restore();

  // Scroll indicator if content overflows
  if (state.summaryMaxScroll > 0) {
    ctx.font = '12px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#555';
    if (state.summaryScroll < state.summaryMaxScroll) {
      ctx.fillText('scroll down for more', W / 2, H - 10);
    }
  }
}

// ============================================================
// INIT & GAME LOOP
// ============================================================
buildTrackSegments();
buildFigures();

function gameLoop() {
  requestAnimationFrame(gameLoop);
  update();
  render();
}
gameLoop();
</script>
